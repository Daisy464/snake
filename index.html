<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake - Avanza Coders</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #f1f5f9;
  }
  h1 { margin: 10px 0; font-size: 28px; letter-spacing: 1px; }
  #score { font-size: 20px; margin-bottom: 10px; }
  canvas {
    background: #1e293b;
    border: 4px solid #38bdf8;
    border-radius: 8px;
  }
  #message {
    margin-top: 14px;
    font-size: 18px;
    min-height: 24px;
    color: #fbbf24;
  }
  button {
    margin-top: 10px;
    padding: 8px 20px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #38bdf8;
    color: #0f172a;
    font-weight: bold;
    cursor: pointer;
  }
  button:hover { background: #7dd3fc; }
  #controls {
    margin-top: 10px;
    font-size: 14px;
    color: #94a3b8;
    text-align: center;
  }
</style>
</head>
<body>
  <h1>🐍 Snake</h1>
  <div id="score">Puntos: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="message"></div>
  <button id="restart">Reiniciar</button>
  <div id="controls">Usa las flechas del teclado (o WASD) para moverte</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const box = 20; // tamaño de cada cuadro
  const cols = canvas.width / box;
  const rows = canvas.height / box;

  let snake, direction, nextDirection, food, score, gameOver, loopId;

  function randomFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * cols),
        y: Math.floor(Math.random() * rows)
      };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    return pos;
  }

  function resetGame() {
    snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
    direction = 'RIGHT';
    nextDirection = 'RIGHT';
    food = randomFood();
    score = 0;
    gameOver = false;
    document.getElementById('score').textContent = 'Puntos: 0';
    document.getElementById('message').textContent = '';
    if (loopId) clearInterval(loopId);
    loopId = setInterval(tick, 110);
  }

  function tick() {
    if (gameOver) return;
    direction = nextDirection;

    const head = { ...snake[0] };
    if (direction === 'UP') head.y--;
    if (direction === 'DOWN') head.y++;
    if (direction === 'LEFT') head.x--;
    if (direction === 'RIGHT') head.x++;

    // Colisión con paredes
    if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
      return endGame();
    }
    // Colisión con su propio cuerpo
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return endGame();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('score').textContent = 'Puntos: ' + score;
      food = randomFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // comida
    ctx.fillStyle = '#f87171';
    ctx.fillRect(food.x * box, food.y * box, box - 2, box - 2);

    // serpiente
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
      ctx.fillRect(s.x * box, s.y * box, box - 2, box - 2);
    });
  }

  function endGame() {
    gameOver = true;
    clearInterval(loopId);
    document.getElementById('message').textContent =
      '¡Perdiste! Puntuación final: ' + score;
  }

  document.addEventListener('keydown', (e) => {
    const key = e.key;
    if ((key === 'ArrowUp' || key === 'w') && direction !== 'DOWN') nextDirection = 'UP';
    else if ((key === 'ArrowDown' || key === 's') && direction !== 'UP') nextDirection = 'DOWN';
    else if ((key === 'ArrowLeft' || key === 'a') && direction !== 'RIGHT') nextDirection = 'LEFT';
    else if ((key === 'ArrowRight' || key === 'd') && direction !== 'LEFT') nextDirection = 'RIGHT';
  });

  document.getElementById('restart').addEventListener('click', resetGame);

  resetGame();
</script>
</body>
</html>
